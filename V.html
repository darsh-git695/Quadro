<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pastel Quadratic Solver</title>

<style>
/* =========================
   ROOT VARIABLES
========================= */
:root{
    --bg1:#f7d9ff;
    --bg2:#d8f3ff;
    --bg3:#dcffe7;

    --card:rgba(255,255,255,0.25);
    --border:rgba(255,255,255,0.35);

    --text:#243042;
    --sub:#4f6075;

    --primary:#8e7dff;
    --secondary:#ff9dcf;
    --mint:#9df5d3;

    --shadow:0 10px 40px rgba(0,0,0,0.12);

    --input-bg:rgba(255,255,255,0.45);
}

/* DARK MODE */
body.dark{
    --bg1:#1f1c2c;
    --bg2:#2d3250;
    --bg3:#1b2735;

    --card:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.1);

    --text:#f1f5ff;
    --sub:#c6d2f2;

    --primary:#8d9eff;
    --secondary:#ff90c2;
    --mint:#7fffd4;

    --shadow:0 10px 40px rgba(0,0,0,0.5);

    --input-bg:rgba(255,255,255,0.08);
}

/* =========================
   BODY
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    color:var(--text);

    background:
    linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));

    transition:0.4s ease;
    position:relative;
}

/* =========================
   FLOATING SHAPES
========================= */
.shape{
    position:absolute;
    border-radius:50%;
    filter:blur(10px);
    animation:float 10s infinite ease-in-out;
    opacity:0.5;
}

.shape1{
    width:200px;
    height:200px;
    background:#ffb7d5;
    top:5%;
    left:5%;
}

.shape2{
    width:250px;
    height:250px;
    background:#b9d8ff;
    bottom:5%;
    right:10%;
    animation-delay:2s;
}

.shape3{
    width:180px;
    height:180px;
    background:#c8ffd8;
    top:50%;
    left:50%;
    animation-delay:4s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-25px);
    }
}

/* =========================
   MAIN CONTAINER
========================= */
.container{
    position:relative;
    z-index:10;

    width:min(95%,900px);
    margin:40px auto;
    padding:30px;

    border-radius:30px;
    background:var(--card);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid var(--border);

    box-shadow:var(--shadow);
}

/* =========================
   HEADER
========================= */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

h1{
    font-size:2.2rem;
    font-weight:700;
}

.subtitle{
    color:var(--sub);
    margin-top:5px;
}

/* =========================
   TOGGLE
========================= */
.toggle{
    border:none;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
    padding:12px 18px;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s ease;
    font-weight:600;
}

.toggle:hover{
    transform:scale(1.05);
}

/* =========================
   FORMULA SECTION
========================= */
.formula-card{
    margin-top:25px;
    padding:25px;
    border-radius:24px;
    background:rgba(255,255,255,0.15);
    text-align:center;
    border:1px solid rgba(255,255,255,0.25);
}

.formula-title{
    font-size:1.1rem;
    margin-bottom:10px;
    color:var(--sub);
}

.formula{
    font-size:2rem;
    font-weight:700;
    color:var(--primary);
}

/* =========================
   INPUTS
========================= */
.inputs{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:30px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:600;
}

input{
    padding:15px;
    border-radius:18px;
    border:none;
    outline:none;
    background:var(--input-bg);
    color:var(--text);
    font-size:1rem;
    backdrop-filter:blur(10px);

    transition:0.3s ease;
}

input:focus{
    transform:translateY(-2px);
    box-shadow:0 0 0 3px rgba(142,125,255,0.3);
}

/* =========================
   BUTTONS
========================= */
.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}

.btn{
    position:relative;
    overflow:hidden;

    border:none;
    padding:15px 25px;
    border-radius:20px;
    cursor:pointer;

    font-size:1rem;
    font-weight:700;

    transition:0.3s ease;
}

.solve-btn{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
    box-shadow:0 10px 25px rgba(142,125,255,0.35);
}

.clear-btn{
    background:linear-gradient(135deg,#ffb3b3,#ffd3a5);
    color:#5a3d3d;
}

.copy-btn{
    background:linear-gradient(135deg,#9fffd9,#a5d8ff);
    color:#244;
}

.btn:hover{
    transform:translateY(-3px) scale(1.03);
}

.btn:active{
    transform:scale(0.96);
}

/* Ripple effect */
.btn::after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    transform:scale(0);
    opacity:0;
    pointer-events:none;
}

.btn:active::after{
    animation:ripple 0.6s linear;
}

@keyframes ripple{
    from{
        transform:scale(0);
        opacity:1;
    }
    to{
        transform:scale(15);
        opacity:0;
    }
}

/* =========================
   ERROR
========================= */
.error{
    margin-top:20px;
    color:#ff4c74;
    font-weight:600;
}

/* =========================
   RESULT CARD
========================= */
.result-card{
    margin-top:30px;
    padding:25px;
    border-radius:25px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.25);

    opacity:0;
    transform:translateY(20px);
    transition:0.5s ease;
}

.result-card.show{
    opacity:1;
    transform:translateY(0);
}

.result-card h2{
    margin-bottom:15px;
}

.result-section{
    margin-top:15px;
    line-height:1.8;
}

.highlight{
    color:var(--primary);
    font-weight:700;
}

/* =========================
   CANVAS GRAPH
========================= */
.graph-container{
    margin-top:30px;
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:25px;
}

canvas{
    width:100%;
    height:300px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
}

/* =========================
   FOOTER
========================= */
.footer{
    margin-top:25px;
    text-align:center;
    color:var(--sub);
    font-size:0.9rem;
}

/* =========================
   MOBILE
========================= */
@media(max-width:600px){
    .formula{
        font-size:1.5rem;
    }

    h1{
        font-size:1.8rem;
    }

    .container{
        padding:20px;
    }
}
</style>
</head>

<body>

<!-- Floating Background Shapes -->
<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<div class="container">

    <!-- Header -->
    <div class="top-bar">
        <div>
            <h1>✨ Quadratic Solver</h1>
            <p class="subtitle">
                Premium pastel equation calculator with graph visualization
            </p>
        </div>

        <button class="toggle" id="modeToggle">
            🌙 Toggle Mode
        </button>
    </div>

    <!-- Formula -->
    <section class="formula-card">
        <div class="formula-title">
            Quadratic Formula
        </div>

        <div class="formula">
            x = (-b ± √(b² - 4ac)) / 2a
        </div>
    </section>

    <!-- Inputs -->
    <section class="inputs">

        <div class="input-group">
            <label for="a">Coefficient a</label>
            <input type="number" id="a" placeholder="Enter a">
        </div>

        <div class="input-group">
            <label for="b">Coefficient b</label>
            <input type="number" id="b" placeholder="Enter b">
        </div>

        <div class="input-group">
            <label for="c">Coefficient c</label>
            <input type="number" id="c" placeholder="Enter c">
        </div>

    </section>

    <!-- Buttons -->
    <div class="buttons">
        <button class="btn solve-btn" onclick="solveQuadratic()">
            Solve Equation
        </button>

        <button class="btn clear-btn" onclick="clearAll()">
            Clear
        </button>

        <button class="btn copy-btn" onclick="copyResult()">
            Copy Result
        </button>
    </div>

    <!-- Error -->
    <div class="error" id="error"></div>

    <!-- Results -->
    <div class="result-card" id="resultCard">

        <h2>📘 Solution</h2>

        <div class="result-section" id="result"></div>

        <div class="graph-container">
            <canvas id="graphCanvas" width="700" height="300"></canvas>
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        Designed with pastel glassmorphism ✨
    </div>

</div>

<script>
/* =========================
   SOUND EFFECT
========================= */
function clickSound(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);

    oscillator.type = "sine";
    oscillator.frequency.value = 500;

    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);

    oscillator.start();

    oscillator.stop(ctx.currentTime + 0.08);
}

/* =========================
   DARK MODE TOGGLE
========================= */
const modeToggle = document.getElementById("modeToggle");

modeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    clickSound();
});

/* =========================
   SOLVE QUADRATIC
========================= */
function solveQuadratic(){

    clickSound();

    const a = parseFloat(document.getElementById("a").value);
    const b = parseFloat(document.getElementById("b").value);
    const c = parseFloat(document.getElementById("c").value);

    const errorDiv = document.getElementById("error");
    const resultCard = document.getElementById("resultCard");
    const resultDiv = document.getElementById("result");

    errorDiv.textContent = "";

    // Validation
    if(isNaN(a) || isNaN(b) || isNaN(c)){
        errorDiv.textContent =
        "⚠️ Please enter valid numbers in all fields.";
        return;
    }

    if(a === 0){
        errorDiv.textContent =
        "⚠️ 'a' cannot be 0 because the equation must be quadratic.";
        return;
    }

    // Discriminant
    const discriminant = (b * b) - (4 * a * c);

    let root1, root2;
    let type;

    // Real roots
    if(discriminant > 0){

        root1 =
        (-b + Math.sqrt(discriminant)) / (2 * a);

        root2 =
        (-b - Math.sqrt(discriminant)) / (2 * a);

        type = "Two distinct real roots";

    }
    else if(discriminant === 0){

        root1 = root2 = (-b / (2 * a));

        type = "One repeated real root";

    }
    else{

        // Complex roots
        const realPart =
        (-b / (2 * a)).toFixed(3);

        const imaginaryPart =
        (Math.sqrt(-discriminant) / (2 * a)).toFixed(3);

        root1 =
        `${realPart} + ${imaginaryPart}i`;

        root2 =
        `${realPart} - ${imaginaryPart}i`;

        type = "Complex / Imaginary roots";

    }

    // Step-by-step solution
    resultDiv.innerHTML = `
        <p>
            <strong>Equation:</strong>
            ${a}x² + ${b}x + ${c} = 0
        </p>

        <p>
            <strong>Discriminant (D):</strong>
            <span class="highlight">
                D = b² - 4ac
            </span>
        </p>

        <p>
            D = (${b})² - 4(${a})(${c})
        </p>

        <p>
            D = ${discriminant.toFixed(3)}
        </p>

        <p>
            <strong>Root Type:</strong>
            ${type}
        </p>

        <hr style="margin:15px 0;border:none;height:1px;background:rgba(255,255,255,0.2);">

        <p>
            <strong>Using Formula:</strong>
        </p>

        <p>
            x = (-b ± √D) / 2a
        </p>

        <p>
            x₁ =
            <span class="highlight">
                ${root1}
            </span>
        </p>

        <p>
            x₂ =
            <span class="highlight">
                ${root2}
            </span>
        </p>
    `;

    resultCard.classList.add("show");

    drawGraph(a,b,c);
}

/* =========================
   CLEAR FUNCTION
========================= */
function clearAll(){

    clickSound();

    document.getElementById("a").value = "";
    document.getElementById("b").value = "";
    document.getElementById("c").value = "";

    document.getElementById("error").textContent = "";

    document.getElementById("resultCard")
    .classList.remove("show");

    // Clear canvas
    const canvas =
    document.getElementById("graphCanvas");

    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* =========================
   COPY RESULT
========================= */
function copyResult(){

    clickSound();

    const resultText =
    document.getElementById("result").innerText;

    if(!resultText){
        alert("No result to copy!");
        return;
    }

    navigator.clipboard.writeText(resultText);

    alert("✅ Result copied!");
}

/* =========================
   DRAW GRAPH
========================= */
function drawGraph(a,b,c){

    const canvas =
    document.getElementById("graphCanvas");

    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Background glow
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Axes
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 1;

    // X-axis
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();

    // Y-axis
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();

    // Draw parabola
    ctx.beginPath();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#8e7dff";

    for(let x = -10; x <= 10; x += 0.1){

        let y = a*x*x + b*x + c;

        let canvasX =
        canvas.width / 2 + x * 25;

        let canvasY =
        canvas.height / 2 - y * 10;

        if(x === -10){
            ctx.moveTo(canvasX, canvasY);
        }
        else{
            ctx.lineTo(canvasX, canvasY);
        }
    }

    ctx.stroke();
}
</script>

</body>
</html>
